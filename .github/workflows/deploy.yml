name: Deploy to Hostico

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v4

    - name: 📂 Sync files
      uses: SamKirby/ftp-deploy-action@master
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        server-dir: public_html/
        exclude: |
          **/.git*
          **/.git*/**
          **/node_modules/**
          .vscode/**
          .agents/**
          .agent/**
          brain/**
          C:\tmp\**
          /tmp/**
          *.ps1
          *.py
          RANDOM_CODE.txt
          README.md
          CONTRIBUTING.md
          LICENSE
          package*.json
