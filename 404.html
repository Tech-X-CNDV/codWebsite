<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>404 - Page Not Found | Tech-X</title>
    <link href="/Css/bootstrap.css" rel="stylesheet" />
    <link href="/Css/bootstrap-icons.css" rel="stylesheet" />
    <link href="/Css/templatemo-topic-listing.css" rel="stylesheet" />
    <style>
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background-color: #f8f9fa;
        text-align: center;
      }

      .error-container {
        max-width: 600px;
        padding: 40px;
        background: white;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      }

      .error-code {
        font-size: 8rem;
        font-weight: 700;
        color: #80d0c7;
        margin-bottom: 0;
      }

      .bi-exclamation-triangle {
        font-size: 4rem;
        color: #f39c12;
      }
    </style>
  </head>

  <body>
    <div
      class="d-flex justify-content-end p-3"
      style="position: absolute; top: 0; right: 0; width: 100%"
    >
      <button
        id="theme-toggle"
        class="navbar-icon"
        aria-label="Toggle dark mode"
      >
        <i class="bi-moon-fill" id="theme-icon"></i>
      </button>
    </div>
    <div class="error-container shadow-lg">
      <i class="bi-exclamation-triangle mb-4"></i>
      <h1 class="error-code">404</h1>
      <h2 class="mb-4">Ups! Pagina nu a fost găsită.</h2>
      <p class="text-secondary mb-5">
        Se pare că link-ul pe care l-ai urmat nu există sau a fost mutat.
      </p>
      <a href="/" class="btn custom-btn">Înapoi la pagina principală</a>
    </div>
  </body>
</html>
